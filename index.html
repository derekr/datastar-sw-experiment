<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datastar SW</title>
</head>
<body>
  <div id="app">
    <p>Loading...</p>
  </div>
  
  <script type="module">
    if ('serviceWorker' in navigator) {
      // If a SW already controls this page, we're good — the SW
      // intercepted this request and served the app shell.
      // This script only runs on the *bootstrap* HTML (not the SW shell).
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');

        if (navigator.serviceWorker.controller) {
          // SW already controlling — check for updates
          reg.update();
        } else {
          // First install — wait for activation then reload so the SW
          // intercepts the next navigation and serves the real app.
          await navigator.serviceWorker.ready;
          window.location.reload();
        }
      } catch (error) {
        console.error('Service Worker registration failed:', error);
      }
    }
  </script>
</body>
</html>
