<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Datastar SW</title>
</head>
<body>
  <div id="app">
    <p>Loading...</p>
  </div>
  
  <script type="module">
    if ('serviceWorker' in navigator) {
      try {
        const swURL = new URL('sw.js', import.meta.url).href;
        const reg = await navigator.serviceWorker.register(swURL, { type: 'module', updateViaCache: 'none' });

        // Single reload gate — prevents double-reload from both
        // the ready/controllerchange paths firing in sequence.
        let reloading = false;
        function reloadOnce() {
          if (reloading) return;
          reloading = true;
          // If we arrived via 404.html SPA redirect, restore the original URL.
          const redirect = sessionStorage.getItem('spa-redirect');
          if (redirect) {
            sessionStorage.removeItem('spa-redirect');
            window.location.replace(redirect);
          } else {
            window.location.reload();
          }
        }

        // Reload when a new SW takes control
        navigator.serviceWorker.addEventListener('controllerchange', reloadOnce);

        if (!navigator.serviceWorker.controller) {
          // First install — wait for the SW to claim this client, then reload.
          // controllerchange fires when claim() runs, triggering reloadOnce.
          // Fallback: if controllerchange doesn't fire within 3s, force reload.
          await navigator.serviceWorker.ready;
          setTimeout(reloadOnce, 3000);
        }

        // Dev: force SW update check on every page load + when Vite rebuilds.
        // Without this, the browser may serve a stale SW from a previous
        // dev session for up to 24 hours. The SW has skipWaiting +
        // clients.claim, so update → activate → controllerchange →
        // reloadOnce handles the rest.
        if (import.meta.hot) {
          reg.update();
          import.meta.hot.on('sw-updated', () => reg.update());
        }

        // Board import: detect #import=<compressed> in URL hash
        const importMatch = location.hash.match(/^#import=(.+)$/);
        if (importMatch && navigator.serviceWorker.controller) {
          const data = importMatch[1];
          // Clear the hash immediately so reload doesn't re-import
          history.replaceState(null, '', location.pathname + location.search);
          try {
            const scope = reg.scope.replace(location.origin, '');
            const res = await fetch(scope + 'import', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ data }),
            });
            const result = await res.json();
            if (result.boardId) {
              window.location.replace(scope + 'boards/' + result.boardId);
            } else {
              window.location.reload();
            }
          } catch (e) {
            console.error('Board import failed:', e);
            document.getElementById('app').innerHTML = '<p>Import failed. <a href="' + location.pathname + '">Go to boards</a></p>';
          }
        }
      } catch (error) {
        console.error('Service Worker registration failed:', error);
      }
    }
  </script>
</body>
</html>
