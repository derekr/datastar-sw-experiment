<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datastar SW</title>
</head>
<body>
  <div id="app">
    <p>Loading...</p>
  </div>
  
  <script type="module">
    if ('serviceWorker' in navigator) {
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');

        // Reload when a new SW takes control (update in flight)
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });

        if (navigator.serviceWorker.controller) {
          // SW already controlling — this bootstrap page shouldn't be
          // visible (SW serves the shell). Check for updates.
          reg.update();
        } else {
          // First install — wait for activation then reload so the SW
          // intercepts the next navigation and serves the real app shell.
          await navigator.serviceWorker.ready;
          window.location.reload();
        }
      } catch (error) {
        console.error('Service Worker registration failed:', error);
      }
    }
  </script>
</body>
</html>
