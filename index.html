<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Datastar SW</title>
</head>
<body>
  <div id="app">
    <p>Loading...</p>
  </div>
  
  <script type="module">
    if ('serviceWorker' in navigator) {
      try {
        const swURL = new URL('sw.js', import.meta.url).href;
        const reg = await navigator.serviceWorker.register(swURL);

        // Single reload gate — prevents double-reload from both
        // the ready/controllerchange paths firing in sequence.
        let reloading = false;
        function reloadOnce() {
          if (reloading) return;
          reloading = true;
          // If we arrived via 404.html SPA redirect, restore the original URL.
          const redirect = sessionStorage.getItem('spa-redirect');
          if (redirect) {
            sessionStorage.removeItem('spa-redirect');
            window.location.replace(redirect);
          } else {
            window.location.reload();
          }
        }

        // Reload when a new SW takes control
        navigator.serviceWorker.addEventListener('controllerchange', reloadOnce);

        if (!navigator.serviceWorker.controller) {
          // First install — wait for the SW to claim this client, then reload.
          // controllerchange fires when claim() runs, triggering reloadOnce.
          // Fallback: if controllerchange doesn't fire within 3s, force reload.
          await navigator.serviceWorker.ready;
          setTimeout(reloadOnce, 3000);
        }
      } catch (error) {
        console.error('Service Worker registration failed:', error);
      }
    }
  </script>
</body>
</html>
